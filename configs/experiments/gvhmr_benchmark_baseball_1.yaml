extends: ../default.yaml

project:
  data_dir: data_full/benchmark_gvhmr_test
  output_dir: outputs_full/benchmark_gvhmr_test

dataset:
  clips_file: data/metadata/clips_benchmark_baseball_1.csv
  clip_ids:
    - benchmark_pitch_vertical_10
    - benchmark_pitch_vertical_09
    - benchmark_hit_vertical_02
    - benchmark_hit_horizontal_06

pose3d:
  enabled: true
  backend: gvhmr
  root_joint: pelvis_center
  normalize_scale: true
  min_valid_joints: 8
  gate_with_2d_prior: false
  confidence_threshold: 0.5
  confidence_thresholds:
    default: 0.5
    torso: 0.45
    mid_limb: 0.50
    distal: 0.60
  external_scale_mode: smpl_world
  external_result_path: "{data_dir}/external_pose3d/{backend}/{clip_id}.csv"

experiments:
  name: gvhmr_benchmark_baseball_1
  default_conditions:
    - image_center_motion_grabcut_pose_complete_smooth
  default_3d_conditions:
    - image_center_motion_grabcut_pose_complete_smooth_3d

conditions:
  image_center_motion_grabcut_pose_complete_smooth: {}
